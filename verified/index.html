<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인증 완료 · 교랑</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; background: #060610; font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; color: #c4b5fd; }
    body { display: flex; align-items: center; justify-content: center; padding: 24px 16px; position: relative; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(circle at 20% 30%, rgba(124,58,237,0.15), transparent 50%), radial-gradient(circle at 80% 70%, rgba(236,72,153,0.08), transparent 50%); pointer-events: none; }
    .container { width: 100%; max-width: 480px; position: relative; z-index: 1; }
    .logo { text-align: center; margin-bottom: 32px; animation: fadeInDown 0.6s ease-out; }
    .logo-box { display: inline-block; background: linear-gradient(135deg, #2d1b69, #1a0f3d); border-radius: 20px; padding: 18px 28px; border: 1px solid rgba(124, 58, 237, 0.3); }
    .logo-name { font-size: 22px; font-weight: 900; color: #c4b5fd; letter-spacing: -0.5px; margin-bottom: 2px; }
    .logo-tag { font-size: 11px; color: #3d3660; letter-spacing: 0.05em; }
    .card { background: #0c0c1e; border-radius: 24px; border: 1px solid #1a1830; overflow: hidden; animation: fadeInUp 0.7s ease-out 0.2s backwards; }
    .card-bar { height: 4px; background: linear-gradient(90deg, #7c3aed, #a78bfa, #ec4899, #a78bfa, #7c3aed); background-size: 200% 100%; animation: shimmer 3s linear infinite; }
    .card-body { padding: 48px 36px 40px; text-align: center; }
    .icon-wrap { width: 96px; height: 96px; margin: 0 auto 28px; position: relative; animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .icon-circle { width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, #7c3aed, #5b21b6); display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 32px rgba(124, 58, 237, 0.4); }
    .icon-wrap::before { content: ''; position: absolute; inset: -8px; border-radius: 50%; background: radial-gradient(circle, rgba(124,58,237,0.4), transparent 70%); animation: pulse 2s ease-in-out infinite; }
    .check-svg { width: 44px; height: 44px; stroke: #fff; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .check-svg path { stroke-dasharray: 50; stroke-dashoffset: 50; animation: drawCheck 0.5s ease-out 0.3s forwards; }
    .title { font-size: 26px; font-weight: 900; color: #c4b5fd; letter-spacing: -0.5px; margin-bottom: 12px; }
    .desc { font-size: 14px; color: #6b6485; line-height: 1.8; margin-bottom: 32px; }
    .btn { display: block; width: 100%; background: linear-gradient(135deg, #7c3aed, #5b21b6); color: #ffffff; text-decoration: none; font-size: 15px; font-weight: 700; padding: 16px 32px; border-radius: 14px; letter-spacing: -0.2px; box-shadow: 0 8px 24px rgba(124, 58, 237, 0.35); transition: transform 0.2s, box-shadow 0.2s; margin-bottom: 12px; text-align: center; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(124, 58, 237, 0.5); }
    .btn-outline { display: block; width: 100%; background: transparent; color: #c4b5fd; text-decoration: none; font-size: 14px; font-weight: 600; padding: 14px 32px; border-radius: 14px; border: 1px solid #2d2b50; transition: background 0.2s, border-color 0.2s; text-align: center; }
    .btn-outline:hover { background: rgba(124, 58, 237, 0.08); border-color: rgba(124, 58, 237, 0.3); }
    .divider { height: 1px; background: #1a1830; margin: 24px 0; }
    .hint { font-size: 12px; color: #6b6485; line-height: 1.6; }
    .footer { text-align: center; margin-top: 28px; font-size: 11px; color: #2d2b50; }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { 0% { transform: scale(0); } 60% { transform: scale(1.1); } 100% { transform: scale(1); } }
    @keyframes drawCheck { to { stroke-dashoffset: 0; } }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.15); opacity: 0.3; } }
    @keyframes shimmer { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }
  </style>
</head>
<body>

  <div class="container">

    <div class="logo">
      <div class="logo-box">
        <div class="logo-name">KYORANG</div>
        <div class="logo-tag">말하지 못한 마음을 꺼낼 수 있는 곳</div>
      </div>
    </div>

    <div class="card">
      <div class="card-bar"></div>
      <div class="card-body">

        <div class="icon-wrap">
          <div class="icon-circle">
            <svg class="check-svg" viewBox="0 0 24 24">
              <path d="M5 12.5l4.5 4.5L19 7.5" />
            </svg>
          </div>
        </div>

        <h1 class="title">인증되었습니다</h1>
        <p class="desc">
          이메일 인증이 완료되었어요.<br />
          교랑톡에서 계속 이어가세요.
        </p>

        <!-- 앱이 설치되어 있다면 (커스텀 스킴 시도) -->
        <a class="btn" id="btn-open-app" href="#">교랑톡 앱 열기</a>

        <!-- 앱 다운로드 -->
        <a class="btn-outline" href="https://play.google.com/store/apps/details?id=com.kyorang.kyorang_talk" target="_blank">
          Google Play에서 다운로드
        </a>

        <div class="divider"></div>

        <p class="hint">
          앱이 설치되어 있지 않다면<br />
          <a href="https://talk.kyorang.com" style="color:#a78bfa;text-decoration:underline;">웹에서 사용하기</a>
        </p>

      </div>
    </div>

    <p class="footer">© 2025 KYORANG · All rights reserved.</p>

  </div>

  <script>
    // URL의 토큰 받아서 앱 열기 시도 (커스텀 스킴 fallback)
    const params = new URLSearchParams(window.location.search);
    const refreshToken = params.get('refresh_token');
    const accessToken = params.get('access_token');

    const btnOpenApp = document.getElementById('btn-open-app');

    if (refreshToken) {
      // 커스텀 스킴 URL 만들기
      const schemeUrl = `kyorangtalk://verified?${params.toString()}`;
      btnOpenApp.href = schemeUrl;
    } else {
      // 토큰 없으면 그냥 웹으로
      btnOpenApp.href = 'https://talk.kyorang.com';
      btnOpenApp.textContent = '웹에서 시작하기';
    }
  </script>

</body>
</html>
